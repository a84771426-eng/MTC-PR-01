<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="consulta-page">
  <main class="consulta-main">
    <section class="consulta-chat">
      <article class="consulta-message is-bot">
        <img
          src="./img/avatar.jpg"
          alt="Atendente virtual"
          class="consulta-avatar"
        >
        <div class="consulta-bubble consulta-bubble--image">
          <img src="./img/emissao-guias.png" alt="Emissão de Guias" class="consulta-first-image">
        </div>
      </article>

      <article class="consulta-message is-bot">
        <img
          src="./img/avatar.jpg"
          alt="Atendente virtual"
          class="consulta-avatar"
        >
        <div class="consulta-bubble consulta-bubble--text">
          Para iniciar o atendimento insira seu CPF:<br>
          <strong>(Somente números)</strong>
        </div>
      </article>
    </section>

    <section class="consulta-input-bar">
      <input
        type="text"
        placeholder="Insira seu CPF..."
        aria-label="Campo de resposta"
        maxlength="14"
        data-cpf-input
      >
      <button type="button" aria-label="Enviar resposta" data-cpf-submit>></button>
    </section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
